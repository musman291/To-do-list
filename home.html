<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Dashboard | Professional</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body class="dashboard-body">
    <div class="app-container">
        <!-- Top Navigation -->
        <header class="top-nav">
            <div class="nav-left">
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" alt="User">
                    <div class="user-info">
                        <span class="greeting">Welcome back,</span>
                        <h3 class="username">Musman</h3>
                    </div>
                </div>
            </div>

            <div class="nav-center">
                <div class="stats-card">
                    <div class="stat">
                        <span class="stat-value" id="activeCount">0</span>
                        <span class="stat-label">Active</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat">
                        <span class="stat-value" id="urgentCount">0</span>
                        <span class="stat-label">Critical</span>
                    </div>
                </div>
            </div>

            <div class="nav-right">
                <a href="index.html" class="logout-link">Log Out</a>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Routine View -->
            <div id="routineView" class="view-container active">
                <!-- Content handled by routine.js -->
            </div>

            <!-- Timeline View -->
            <div id="timelineView" class="view-container" style="display:none;">
                <!-- Content handled by timeline.js -->
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="taskModal" class="modal">
        <div class="modal-content clean-modal">
            <span class="close-modal">&times;</span>
            <h2 id="modalTitle">Create New Task</h2>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="input-group">
                    <label for="taskName">Task Name</label>
                    <input type="text" id="taskName" required placeholder="What needs to be done?">
                </div>
                <!-- Dynamic Content Area -->
                <div id="modalDateFields">
                    <div class="form-row">
                        <div class="input-group">
                            <label for="taskDate">Date</label>
                            <input type="date" id="taskDate" required>
                        </div>
                        <div class="input-group">
                            <label for="taskTime">Time</label>
                            <input type="time" id="taskTime" required>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="taskDesc">Description (Optional)</label>
                    <textarea id="taskDesc" rows="3" placeholder="Add details..."></textarea>
                </div>
                <button type="submit" class="primary-btn full-width">Save Task</button>
            </form>
        </div>
    </div>

    <script src="timeline.js"></script>
    <script src="routine.js"></script>
    <script src="home.js"></script>
</body>

</html>
